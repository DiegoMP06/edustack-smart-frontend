<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <defs>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4f46e5"/>
            <stop offset="100%" style="stop-color:#6366f1"/>
        </linearGradient>
    </defs>

    <!-- Barra base (zinc-900) -->
    <rect x="6" y="44" width="48" height="10" rx="5" ry="5" fill="#18181b" transform="rotate(-8, 30, 49)"/>
    <!-- Barra media (zinc-500) -->
    <rect x="10" y="28" width="38" height="9" rx="4.5" ry="4.5" fill="#71717a" transform="rotate(-8, 29, 32)"/>
    <!-- Barra superior (indigo) -->
    <rect x="14" y="13" width="27" height="9" rx="4.5" ry="4.5" fill="url(#indigoGrad)" filter="url(#glow)" transform="rotate(-8, 27, 17)"/>
    <!-- Nodo IA -->
    <circle cx="37" cy="14" r="5.5" fill="white" filter="url(#glow)"/>
    <circle cx="37" cy="14" r="3" fill="#4f46e5"/>
</svg>
